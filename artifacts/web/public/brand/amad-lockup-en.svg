<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none" role="img" aria-label="Amad Construction Intelligence">
  <title>Amad</title>
  <!-- Symbol: Three Pillars (48×48 area, left-aligned) -->
  <rect x="5" y="22" width="10" height="22" rx="1.5" fill="currentColor"/>
  <rect x="19" y="8" width="10" height="36" rx="1.5" fill="currentColor"/>
  <rect x="33" y="22" width="10" height="22" rx="1.5" fill="currentColor"/>
  <rect x="3" y="44" width="42" height="2" rx="1" fill="currentColor"/>
  <!-- Divider -->
  <line x1="58" y1="10" x2="58" y2="38" stroke="currentColor" stroke-opacity="0.2" stroke-width="1"/>
  <!-- Wordmark: AMAD -->
  <text
    x="68"
    y="22"
    font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
    font-size="18"
    font-weight="700"
    fill="currentColor"
    letter-spacing="3"
  >AMAD</text>
  <!-- Descriptor -->
  <text
    x="68"
    y="36"
    font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
    font-size="8"
    font-weight="500"
    fill="currentColor"
    fill-opacity="0.55"
    letter-spacing="2.5"
  >CONSTRUCTION INTELLIGENCE</text>
</svg>
