<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none" role="img" aria-label="عَمَد — Amad Arabic lockup">
  <title>عَمَد</title>
  <!-- Arabic lockup — RTL: wordmark on left, symbol on right -->
  <!-- Symbol: Three Pillars (right-aligned) -->
  <rect x="168" y="22" width="10" height="22" rx="1.5" fill="currentColor"/>
  <rect x="182" y="8" width="10" height="36" rx="1.5" fill="currentColor"/>
  <rect x="196" y="22" width="10" height="22" rx="1.5" fill="currentColor"/>
  <rect x="166" y="44" width="42" height="2" rx="1" fill="currentColor"/>
  <!-- Divider -->
  <line x1="158" y1="10" x2="158" y2="38" stroke="currentColor" stroke-opacity="0.2" stroke-width="1"/>
  <!-- Arabic wordmark -->
  <text
    x="148"
    y="22"
    text-anchor="end"
    font-family="'Noto Sans Arabic', 'Arial Unicode MS', sans-serif"
    font-size="20"
    font-weight="700"
    fill="currentColor"
    direction="rtl"
  >عَمَد</text>
  <!-- Arabic descriptor -->
  <text
    x="148"
    y="37"
    text-anchor="end"
    font-family="'Noto Sans Arabic', 'Arial Unicode MS', sans-serif"
    font-size="9"
    font-weight="500"
    fill="currentColor"
    fill-opacity="0.55"
    direction="rtl"
  >للذكاء الإنشائي</text>
</svg>
