<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" role="img" aria-label="Amad symbol">
  <title>Amad symbol</title>
  <!-- Three Pillars — the structural mark of Amad (عَمَد) -->
  <!-- Left pillar: support column -->
  <rect x="5" y="22" width="10" height="22" rx="1.5" fill="currentColor"/>
  <!-- Centre pillar: dominant, tallest — the commanding column -->
  <rect x="19" y="8" width="10" height="36" rx="1.5" fill="currentColor"/>
  <!-- Right pillar: support column, mirrors left -->
  <rect x="33" y="22" width="10" height="22" rx="1.5" fill="currentColor"/>
  <!-- Foundation baseline — the ground everything rests on -->
  <rect x="3" y="44" width="42" height="2" rx="1" fill="currentColor"/>
</svg>
