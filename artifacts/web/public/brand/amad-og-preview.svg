<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <title>Amad Construction Intelligence</title>
  <!-- Background: deep navy gradient -->
  <rect width="1200" height="630" fill="#0A1628"/>
  <!-- Subtle grid pattern for depth -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.04"/>
  <defs>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M60 0 L0 0 0 60" stroke="#C8953A" stroke-width="0.5" fill="none"/>
    </pattern>
    <linearGradient id="fadeLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <rect width="300" height="630" fill="url(#fadeLeft)"/>
  <rect x="900" width="300" height="630" fill="url(#fadeRight)"/>

  <!-- Large background pillars (decorative, right side) -->
  <rect x="880" y="180" width="56" height="380" rx="6" fill="#C8953A" opacity="0.12"/>
  <rect x="956" y="100" width="56" height="460" rx="6" fill="#C8953A" opacity="0.08"/>
  <rect x="1032" y="220" width="56" height="340" rx="6" fill="#C8953A" opacity="0.05"/>
  <rect x="840" y="544" width="272" height="6" rx="3" fill="#C8953A" opacity="0.10"/>

  <!-- Logo mark (left-centred) -->
  <!-- Symbol: three pillars at 80px scale -->
  <rect x="100" y="218" width="34" height="66" rx="4" fill="#FFFFFF"/>
  <rect x="148" y="182" width="34" height="102" rx="4" fill="#C8953A"/>
  <rect x="196" y="218" width="34" height="66" rx="4" fill="#FFFFFF"/>
  <rect x="92" y="287" width="146" height="6" rx="3" fill="#FFFFFF" opacity="0.6"/>

  <!-- Product name -->
  <text x="100" y="356" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="72" font-weight="700" fill="#FFFFFF" letter-spacing="8">AMAD</text>

  <!-- Descriptor -->
  <text x="103" y="396" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="18" font-weight="500" fill="#C8953A" letter-spacing="4">CONSTRUCTION INTELLIGENCE</text>

  <!-- Tagline -->
  <text x="103" y="448" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="400" fill="#FFFFFF" opacity="0.60">Operational intelligence for the built world.</text>

  <!-- Bottom border accent -->
  <rect x="0" y="618" width="1200" height="12" fill="#C8953A" opacity="0.7"/>
</svg>
