openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 2.1.0
  description: Construction AI Platform — Phase 2 API (routes match FastAPI backend exactly)
servers:
  - url: /api
    description: Base API path (Python FastAPI backend)
tags:
  - name: health
    description: Health checks
  - name: auth
    description: Authentication
  - name: dashboard
    description: Dashboard metrics
  - name: projects
    description: Projects
  - name: procurement
    description: Purchase requests and orders
  - name: suppliers
    description: Suppliers
  - name: siteReports
    description: Site reports (project-scoped)
  - name: safety
    description: Safety events and NCRs (project-scoped)
  - name: meetings
    description: Meetings and decisions (project-scoped)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    UserOut:
      type: object
      required: [id, email, role, is_active, created_at]
      properties:
        id:
          type: integer
        email:
          type: string
        full_name:
          type: ["string", "null"]
        role:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    RegisterInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        full_name:
          type: ["string", "null"]
        role:
          type: string
          default: site_engineer

    TokenResponse:
      type: object
      required: [access_token, token_type, user]
      properties:
        access_token:
          type: string
        token_type:
          type: string
        user:
          $ref: "#/components/schemas/UserOut"

    DashboardSummary:
      type: object
      required:
        - total_projects
        - active_projects
        - completed_projects
        - delayed_projects
        - on_hold_projects
        - total_suppliers
        - active_suppliers
        - total_purchase_requests
        - open_purchase_requests
        - total_purchase_orders
        - late_purchase_orders
        - total_safety_events
        - high_severity_events
        - total_ncrs
        - open_ncrs
        - total_site_reports
        - total_meetings
        - total_decisions
      properties:
        total_projects:
          type: integer
        active_projects:
          type: integer
        completed_projects:
          type: integer
        delayed_projects:
          type: integer
        on_hold_projects:
          type: integer
        total_suppliers:
          type: integer
        active_suppliers:
          type: integer
        total_purchase_requests:
          type: integer
        open_purchase_requests:
          type: integer
        total_purchase_orders:
          type: integer
        late_purchase_orders:
          type: integer
        total_safety_events:
          type: integer
        high_severity_events:
          type: integer
        total_ncrs:
          type: integer
        open_ncrs:
          type: integer
        total_site_reports:
          type: integer
        total_meetings:
          type: integer
        total_decisions:
          type: integer

    HealthScoreOut:
      type: object
      required: [project_id, project_code, project_name, status, score, level, reasons,
                 schedule_penalty, safety_penalty, ncr_penalty, procurement_penalty, risk_penalty]
      properties:
        project_id:
          type: integer
        project_code:
          type: string
        project_name:
          type: string
        status:
          type: string
        score:
          type: integer
          minimum: 0
          maximum: 100
        level:
          type: string
          enum: [Excellent, Good, "At Risk", Critical]
        reasons:
          type: array
          items:
            type: string
        schedule_penalty:
          type: number
        safety_penalty:
          type: number
        ncr_penalty:
          type: number
        procurement_penalty:
          type: number
        risk_penalty:
          type: number

    Project:
      type: object
      required: [id, project_code, project_name, project_type, client_name, city, start_date, planned_finish, status, budget]
      properties:
        id:
          type: integer
        project_code:
          type: string
        project_name:
          type: string
        project_type:
          type: string
        client_name:
          type: string
        city:
          type: string
        start_date:
          type: string
        planned_finish:
          type: string
        actual_finish:
          type: ["string", "null"]
        status:
          type: string
        budget:
          type: number

    Supplier:
      type: object
      required: [id, supplier_name, category, city, status]
      properties:
        id:
          type: integer
        supplier_name:
          type: string
        category:
          type: string
        city:
          type: string
        status:
          type: string

    PurchaseRequest:
      type: object
      required: [id, project_id, request_no, status, created_at]
      properties:
        id:
          type: integer
        project_id:
          type: integer
        request_no:
          type: string
        material_category:
          type: ["string", "null"]
        specification:
          type: ["string", "null"]
        required_delivery_date:
          type: ["string", "null"]
        status:
          type: string
        rework_reason:
          type: ["string", "null"]
        created_at:
          type: string

    PurchaseOrder:
      type: object
      required: [id, pr_id, project_id, supplier_id, po_number, issue_date, promised_delivery, status, is_late, delay_days]
      properties:
        id:
          type: integer
        pr_id:
          type: integer
        project_id:
          type: integer
        supplier_id:
          type: integer
        po_number:
          type: string
        issue_date:
          type: string
        promised_delivery:
          type: string
        actual_delivery:
          type: ["string", "null"]
        status:
          type: string
        is_late:
          type: boolean
        delay_days:
          type: integer
        delay_root_cause:
          type: ["string", "null"]

    SiteReport:
      type: object
      required: [id, project_id, report_date, weather, summary]
      properties:
        id:
          type: integer
        project_id:
          type: integer
        report_date:
          type: string
        weather:
          type: string
        summary:
          type: string

    SafetyEvent:
      type: object
      required: [id, project_id, subcontractor_id, event_date, severity, description, corrective_action]
      properties:
        id:
          type: integer
        project_id:
          type: integer
        subcontractor_id:
          type: integer
        event_date:
          type: string
        severity:
          type: string
        description:
          type: string
        corrective_action:
          type: string

    NCR:
      type: object
      required: [id, project_id, ncr_type, description, root_cause, issue_date, status]
      properties:
        id:
          type: integer
        project_id:
          type: integer
        supplier_id:
          type: ["integer", "null"]
        subcontractor_id:
          type: ["integer", "null"]
        ncr_type:
          type: string
        description:
          type: string
        root_cause:
          type: string
        issue_date:
          type: string
        status:
          type: string

    Meeting:
      type: object
      required: [id, project_id, meeting_date, title, meeting_type]
      properties:
        id:
          type: integer
        project_id:
          type: integer
        meeting_date:
          type: string
        title:
          type: string
        meeting_type:
          type: string

    ProjectDecision:
      type: object
      required: [id, project_id, meeting_id, decision_date, decision_text, owner]
      properties:
        id:
          type: integer
        project_id:
          type: integer
        meeting_id:
          type: integer
        decision_date:
          type: string
        decision_text:
          type: string
        owner:
          type: string

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /v1/auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login and get JWT token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid credentials

  /v1/auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserOut"
        "409":
          description: Email already registered

  /v1/auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserOut"
        "401":
          description: Unauthorized

  /v1/dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Aggregated dashboard metrics
      responses:
        "200":
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /v1/projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /v1/projects/health-scores:
    get:
      operationId: listProjectHealthScores
      tags: [projects]
      summary: Return health scores for all projects, sorted by score ascending
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of project health scores (worst first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HealthScoreOut"

  /v1/projects/{project_id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project by ID
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found

  /v1/projects/{project_id}/health:
    get:
      operationId: getProjectHealth
      tags: [projects]
      summary: Get health score for a single project
      security:
        - bearerAuth: []
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project health score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthScoreOut"
        "404":
          description: Not found

  /v1/suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List all suppliers
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"

  /v1/suppliers/{supplier_id}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      summary: Get a supplier by ID
      parameters:
        - name: supplier_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "404":
          description: Not found

  /v1/procurement/purchase-requests:
    get:
      operationId: listPurchaseRequests
      tags: [procurement]
      summary: List purchase requests
      parameters:
        - name: project_id
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: material_category
          in: query
          schema:
            type: string
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of purchase requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseRequest"

  /v1/procurement/purchase-orders:
    get:
      operationId: listPurchaseOrders
      tags: [procurement]
      summary: List purchase orders
      parameters:
        - name: project_id
          in: query
          schema:
            type: integer
        - name: supplier_id
          in: query
          schema:
            type: integer
        - name: is_late
          in: query
          schema:
            type: boolean
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of purchase orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PurchaseOrder"

  /v1/projects/{project_id}/site-reports:
    get:
      operationId: listProjectSiteReports
      tags: [siteReports]
      summary: List site reports for a project
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of site reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SiteReport"

  /v1/projects/{project_id}/safety-events:
    get:
      operationId: listProjectSafetyEvents
      tags: [safety]
      summary: List safety events for a project
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
        - name: severity
          in: query
          schema:
            type: string
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of safety events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SafetyEvent"

  /v1/projects/{project_id}/ncrs:
    get:
      operationId: listProjectNcrs
      tags: [safety]
      summary: List NCRs for a project
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: ncr_type
          in: query
          schema:
            type: string
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of NCRs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NCR"

  /v1/projects/{project_id}/meetings:
    get:
      operationId: listProjectMeetings
      tags: [meetings]
      summary: List meetings for a project
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
        - name: meeting_type
          in: query
          schema:
            type: string
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of meetings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Meeting"

  /v1/projects/{project_id}/decisions:
    get:
      operationId: listProjectDecisions
      tags: [meetings]
      summary: List decisions for a project
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: integer
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of project decisions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectDecision"
